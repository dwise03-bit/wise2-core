services:
  traefik:
    image: traefik:v3.4
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: postgres:16
    env_file:
      - .env
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  api:
    build: ./api
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3001:3000"
    restart: unless-stopped

  worker:
    build: ./worker
    env_file:
      - .env
    restart: unless-stopped
