name: Deploy - Staging & Production

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/**'
      - 'infrastructure/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK_URL }}
  DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}

jobs:
  # Determine deployment environment
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: determine
        name: Determine Environment
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="staging"
          fi
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Deploying to: $ENVIRONMENT"

      - id: version
        name: Generate Version
        run: |
          VERSION="${{ github.sha }}"
          echo "version=${VERSION:0:7}" >> $GITHUB_OUTPUT

  # Build and push images
  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, dashboard, admin-dashboard, bot, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/wise-${{ matrix.service }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/wise-${{ matrix.service }}:latest-${{ needs.prepare.outputs.environment }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Update image tags in docker-compose
        run: |
          sed -i 's|image: wise-|image: ${{ env.REGISTRY }}/${{ github.repository }}/wise-|g' docker-compose.yml
          sed -i 's|:latest|:latest-staging|g' docker-compose.yml

      - name: Deploy via webhook
        run: |
          curl -X POST \
            -H "X-Secret: ${{ env.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "staging",
              "version": "${{ needs.prepare.outputs.version }}",
              "timestamp": "'$(date -u +%s)'"
            }' \
            "${{ env.DEPLOY_WEBHOOK }}/deploy" \
            || echo "⚠️ Webhook deployment initiated (check server logs)"

      - name: Notify deployment
        run: |
          echo "✅ Staging deployment initiated for version ${{ needs.prepare.outputs.version }}"
          echo "Check deployment server for status"

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      auto_merge: false
    steps:
      - uses: actions/checkout@v4

      - name: Create production release
        run: |
          echo "Production Release: ${{ needs.prepare.outputs.version }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

      - name: Update image tags for production
        run: |
          sed -i 's|image: wise-|image: ${{ env.REGISTRY }}/${{ github.repository }}/wise-|g' docker-compose.yml
          sed -i 's|:latest|:latest-production|g' docker-compose.yml

      - name: Deploy via webhook
        run: |
          curl -X POST \
            -H "X-Secret: ${{ env.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "production",
              "version": "${{ needs.prepare.outputs.version }}",
              "timestamp": "'$(date -u +%s)'",
              "commit": "${{ github.sha }}"
            }' \
            "${{ env.DEPLOY_WEBHOOK }}/deploy" \
            || echo "⚠️ Webhook deployment initiated (check server logs)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            Production deployment version ${{ needs.prepare.outputs.version }}
            Commit: ${{ github.sha }}

  # Health check
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check API health
        continue-on-error: true
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:3000/health 2>/dev/null; then
              echo "✅ API health check passed"
              exit 0
            fi
            echo "Attempt $i: waiting for API..."
            sleep 5
          done
          echo "⚠️ Health check timed out (deployment may still be in progress)"

  # Notify on failure
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs for details"
