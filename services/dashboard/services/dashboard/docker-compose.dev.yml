version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wise2-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wise2_core}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/02-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wise2_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wise2-network
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_min_duration_statement=0"

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: wise2-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wise2-network
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-dev} --appendonly yes

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: wise2-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/config/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_dev_data:/prometheus
    environment:
      TZ: UTC
    networks:
      - wise2-network
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # Alertmanager (optional, for alerts)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: wise2-alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./infrastructure/config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_dev_data:/alertmanager
    networks:
      - wise2-network
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  # Grafana Dashboards (optional, for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: wise2-grafana
    ports:
      - "${GRAFANA_PORT:-3010}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-worldmap-panel
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./infrastructure/config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infrastructure/config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    networks:
      - wise2-network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started

  # MinIO (optional, for S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: wise2-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_dev_data:/minio_data
    networks:
      - wise2-network
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  prometheus_dev_data:
    driver: local
  alertmanager_dev_data:
    driver: local
  grafana_dev_data:
    driver: local
  minio_dev_data:
    driver: local

networks:
  wise2-network:
    driver: bridge
