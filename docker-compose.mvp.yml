version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wise2-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_postgres_admin_2026
      POSTGRES_DB: postgres
      POSTGRES_APP_PASSWORD: wise2_prod_secure_2026
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wise2-redis
    command: redis-server --bind 127.0.0.1 --requirepass password
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: wise2-core_api:latest
    container_name: wise2-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: wise2_prod_user
      DB_PASSWORD: wise2_prod_secure_2026
      DB_NAME: wise2_core_prod
      DATABASE_URL: postgresql://wise2_prod_user:wise2_prod_secure_2026@postgres:5432/wise2_core_prod
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: password
      JWT_SECRET: wise2-secret-key-production-2026-change-in-prod
      JWT_EXPIRATION: 86400
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost:3010
    ports:
      - "127.0.0.1:3010:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  website:
    image: wise2-core_website:latest
    container_name: wise2-website
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3010
    ports:
      - "3001:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
