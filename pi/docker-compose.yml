# WISE² Raspberry Pi 3B+ Docker Compose Configuration
# Production-ready appliance for Pi 3B+ with 1GB RAM
#
# Optimized for:
# - Minimal memory footprint (target < 500MB idle)
# - Fast boot (target < 60 seconds)
# - Excellent performance despite limited hardware
#
# Usage:
#   docker-compose -f pi/docker-compose.yml up -d
#   docker-compose -f pi/docker-compose.yml logs -f
#   docker-compose -f pi/docker-compose.yml ps

version: '3.9'

services:
  # ============================================================================
  # Reverse Proxy & Service Discovery
  # ============================================================================
  traefik:
    image: traefik:v2.11-alpine
    container_name: wise2-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik-acme.json:/acme.json
    networks:
      - wise2-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

  # ============================================================================
  # Database - SQLite (Embedded)
  # ============================================================================
  # Note: SQLite runs in the API container, no separate service needed
  # Stored in: /data/wise2.db

  # ============================================================================
  # Cache & Session Store
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: wise2-redis
    command:
      - redis-server
      - "--maxmemory=256mb"
      - "--maxmemory-policy=allkeys-lru"
      - "--requirepass=${REDIS_PASSWORD}"
      - "--loglevel=notice"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - wise2-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 300M

  # ============================================================================
  # Core API Service
  # ============================================================================
  api:
    build:
      context: ..
      dockerfile: pi/Dockerfile.api
    container_name: wise2-api
    environment:
      NODE_ENV: production
      ENVIRONMENT: pi
      APP_NAME: "WISE² Enterprise"
      APP_VERSION: "1.0.0-pi"

      # Database (SQLite embedded)
      DATABASE_URL: "file:/data/wise2.db"
      DB_TYPE: "sqlite"

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # JWT & Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: "7d"
      API_KEY: ${API_KEY}

      # Server
      PORT: 3000
      HOST: "0.0.0.0"
      LOG_LEVEL: info

      # Ollama (optional, auto-disabled if no memory)
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "qwen2.5:1.5b"
    ports:
      - "3000:3000"
    volumes:
      - api_data:/data
      - ./config/api.env:/app/.env.production:ro
    networks:
      - wise2-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 384M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`wise.local`) && PathPrefix(`/api`)"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  # ============================================================================
  # Dashboard (Web UI)
  # ============================================================================
  dashboard:
    build:
      context: ..
      dockerfile: pi/Dockerfile.dashboard
    container_name: wise2-dashboard
    environment:
      NEXT_PUBLIC_API_URL: "http://wise.local/api"
      NEXT_PUBLIC_WS_URL: "ws://wise.local/api/ws"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3001:3000"
    networks:
      - wise2-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`wise.local`)"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  # ============================================================================
  # Optional: Ollama AI (Disabled by default on Pi)
  # ============================================================================
  # Uncomment to enable AI features
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: wise2-ollama
  #   environment:
  #     OLLAMA_HOST: "0.0.0.0:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - wise2-network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #   restart: unless-stopped
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "50m"
  #       max-file: "2"

  # ============================================================================
  # Optional: Monitoring (Prometheus - Lightweight)
  # ============================================================================
  # Uncomment to enable monitoring
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: wise2-prometheus
  #   volumes:
  #     - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #     - '--storage.tsdb.retention.time=7d'
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - wise2-network
  #   restart: unless-stopped
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "30m"
  #       max-file: "2"

  # ============================================================================
  # Optional: Grafana Dashboards (Lightweight)
  # ============================================================================
  # Uncomment to enable dashboards
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: wise2-grafana
  #   environment:
  #     GF_SECURITY_ADMIN_USER: admin
  #     GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
  #     GF_SERVER_ROOT_URL: http://wise.local:3003
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #   ports:
  #     - "3003:3000"
  #   networks:
  #     - wise2-network
  #   restart: unless-stopped
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "30m"
  #       max-file: "2"

# ============================================================================
# Networks
# ============================================================================
networks:
  wise2-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis_data:
    driver: local
  api_data:
    driver: local

# ============================================================================
# Notes
# ============================================================================
#
# This configuration is optimized for Raspberry Pi 3B+ with 1GB RAM.
#
# Key optimizations:
# 1. Minimal service set (only essentials)
# 2. Alpine-based images (smallest size)
# 3. Memory limits on all services
# 4. SQLite instead of PostgreSQL (embedded)
# 5. Redis cache only (256MB max)
# 6. Traefik for efficient routing
# 7. Automatic service restart
# 8. Structured logging
#
# To start:
#   docker-compose -f pi/docker-compose.yml up -d
#
# To check status:
#   docker-compose -f pi/docker-compose.yml ps
#
# To view logs:
#   docker-compose -f pi/docker-compose.yml logs -f [service]
#
# To stop:
#   docker-compose -f pi/docker-compose.yml down
#
