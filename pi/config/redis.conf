# Redis Configuration for WISE² on Raspberry Pi
# Optimized for 256MB memory limit

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (disabled for performance)
save ""
appendonly no

# Network
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Logging
loglevel notice
logfile ""

# Database
databases 16

# Snapshot (disabled)
# save 900 1
# save 300 10
# save 60 10000

# Replication
slave-serve-stale-data yes
slave-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5

# Security
requirepass CHANGE_THIS_PASSWORD

# Limits
maxclients 10000

# Performance Tuning
hz 10
aof-rewrite-incremental-fsync yes
