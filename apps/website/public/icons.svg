<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" style="display: none;">
  <!-- WISE² Logo -->
  <symbol id="logo-wise2" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="none"/>
    <text x="100" y="130" font-family="Orbitron, monospace" font-size="80" font-weight="900" text-anchor="middle" fill="#39FF14" letter-spacing="-2">WISE</text>
    <text x="160" y="110" font-family="Orbitron, monospace" font-size="40" font-weight="900" fill="#39FF14" filter="url(#glow)"  style="text-shadow: 0 0 8px rgba(57,255,20,.6)">2</text>
  </symbol>

  <!-- Sound Lab -->
  <symbol id="icon-sound" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#39FF14" stroke-width="2"/>
    <path d="M 20 32 L 20 22 L 28 28 L 28 22 L 36 32 L 28 42 L 28 36 L 20 42 Z" fill="#39FF14"/>
    <circle cx="44" cy="24" r="3" fill="#00D9FF"/>
    <circle cx="44" cy="32" r="3" fill="#00D9FF"/>
    <circle cx="44" cy="40" r="3" fill="#00D9FF"/>
  </symbol>

  <!-- Lyrics Lab -->
  <symbol id="icon-lyrics" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#00D9FF" stroke-width="2"/>
    <path d="M 18 20 Q 32 18 46 20 M 18 28 Q 32 26 46 28 M 18 36 Q 32 34 46 36 M 18 44 Q 32 42 46 44" stroke="#00D9FF" stroke-width="2" fill="none" stroke-linecap="round"/>
  </symbol>

  <!-- Live Studio -->
  <symbol id="icon-live" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#ff5c5c" stroke-width="2"/>
    <circle cx="32" cy="32" r="18" fill="none" stroke="#ff5c5c" stroke-width="2"/>
    <circle cx="32" cy="32" r="8" fill="#ff5c5c" opacity="0.8"/>
    <circle cx="32" cy="32" r="8" fill="none" stroke="#ff5c5c" stroke-width="1" opacity="0.4" style="animation: pulse 1s infinite"/>
  </symbol>

  <!-- Jingle Lab -->
  <symbol id="icon-jingle" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#e0a83c" stroke-width="2"/>
    <path d="M 24 24 L 24 42 L 32 38 L 40 42 L 40 24" fill="none" stroke="#e0a83c" stroke-width="2" stroke-linejoin="round"/>
  </symbol>

  <!-- Voice Lab -->
  <symbol id="icon-voice" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <path d="M 32 18 Q 38 18 38 26 Q 38 34 32 34 Q 26 34 26 26 Q 26 18 32 18" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <line x1="32" y1="34" x2="32" y2="46" stroke="#a78bfa" stroke-width="2"/>
    <path d="M 26 46 L 38 46" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Content Factory -->
  <symbol id="icon-factory" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <path d="M 22 44 L 22 24 L 26 18 L 30 24 L 30 44 M 34 44 L 34 28 L 38 22 L 42 28 L 42 44 M 46 44 L 46 32 L 50 26 L 54 32 L 54 44" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Client Showcase -->
  <symbol id="icon-showcase" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#ec4899" stroke-width="2"/>
    <rect x="18" y="22" width="28" height="20" fill="none" stroke="#ec4899" stroke-width="2"/>
    <circle cx="24" cy="28" r="2" fill="#ec4899"/>
    <circle cx="32" cy="28" r="2" fill="#ec4899"/>
    <circle cx="40" cy="28" r="2" fill="#ec4899"/>
    <line x1="18" y1="38" x2="46" y2="38" stroke="#ec4899" stroke-width="1"/>
  </symbol>

  <!-- Command Center -->
  <symbol id="icon-command" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#39FF14" stroke-width="2"/>
    <rect x="18" y="20" width="28" height="24" fill="none" stroke="#39FF14" stroke-width="2" rx="2"/>
    <circle cx="22" cy="26" r="1.5" fill="#39FF14"/>
    <circle cx="28" cy="26" r="1.5" fill="#39FF14"/>
    <circle cx="34" cy="26" r="1.5" fill="#39FF14"/>
    <circle cx="40" cy="26" r="1.5" fill="#39FF14"/>
    <line x1="18" y1="32" x2="46" y2="32" stroke="#39FF14" stroke-width="1"/>
    <line x1="20" y1="36" x2="44" y2="36" stroke="#39FF14" stroke-width="1" opacity="0.6"/>
  </symbol>

  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
