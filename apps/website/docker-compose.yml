version: '3.9'

services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: wise2-website
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://wise2.net}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.wise2.net}
      NEXT_PUBLIC_ANALYTICS_ID: ${NEXT_PUBLIC_ANALYTICS_ID:-G-WISE2NET}
    ports:
      - "3000:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wise2-network
    labels:
      - "com.wise2.service=website"
      - "com.wise2.version=1.0"

  # Optional: Nginx reverse proxy for production
  # Uncomment to enable SSL termination and caching
  # nginx:
  #   image: nginx:alpine
  #   container_name: wise2-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - website
  #   restart: always
  #   networks:
  #     - wise2-network

networks:
  wise2-network:
    driver: bridge

