version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wise2-postgres-prod
    environment:
      # Root/admin user credentials (for initialization)
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-secure_postgres_admin_2026}
      # Application database and user (created by init script)
      POSTGRES_DB: postgres  # Connect to default postgres db initially
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-wise2_prod_secure_2026}
      # Logging and performance is configured via postgresql.conf
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # Mount initialization script
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      # Data persistence
      - postgres_data:/var/lib/postgresql/data
      # WAL archiving for backup/recovery (optional)
      - postgres_wal:/var/lib/postgresql/wal
    healthcheck:
      # Check both admin user and app user can connect
      test:
        - CMD-SHELL
        - |
          pg_isready -U postgres -h localhost -p 5432 && \
          pg_isready -U wise2_prod_user -h localhost -p 5432 -d wise2_core_prod
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
    command: redis-server --bind 127.0.0.1 --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: wise2-api-prod
    environment:
      # Application Settings
      NODE_ENV: production
      PORT: 3001
      API_PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Database Configuration (TypeORM uses individual DB_* variables)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_APP_USER:-wise2_prod_user}
      DB_PASSWORD: ${POSTGRES_APP_PASSWORD:-wise2_prod_secure_2026}
      DB_NAME: wise2_core_prod

      # DATABASE_URL - required by API bootstrap, uses DB_* vars fallback
      DATABASE_URL: postgresql://wise2_prod_user:wise2_prod_secure_2026@postgres:5432/wise2_core_prod

      # Redis Configuration
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}

      # Security
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-to-secure-random-string}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3002,http://localhost:3003}

      # Payment Processing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}

      # OAuth - Google
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}

      # OAuth - GitHub
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
    ports:
      - "127.0.0.1:3010:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3010
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  studio:
    build:
      context: .
      dockerfile: apps/studio/Dockerfile
    container_name: wise2-studio
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3005:3003"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Monitoring & Observability Stack
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: wise2-prometheus
    volumes:
      - ./infrastructure/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.listen-address=127.0.0.1:9090'
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    healthcheck:
      # prom/prometheus is busybox-based and has no curl; wget is present.
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: wise2-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.wise2.net
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ADMIN_USER_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  postgres_wal:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# DATABASE_URL fix
