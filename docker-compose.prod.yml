version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wise2_core}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-wise2_core}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PORT: 3001
    ports:
      - "3010:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3010
    ports:
      - "3002:3000"
    depends_on:
      - api
    restart: unless-stopped

  # admin:
  #   build:
  #     context: .
  #     dockerfile: apps/admin/Dockerfile
  #   environment:
  #     NODE_ENV: production
  #     NEXT_PUBLIC_API_URL: http://localhost:3001
  #   ports:
  #     - "3003:3000"
  #   depends_on:
  #     - api
  #   restart: unless-stopped

volumes:
  postgres_data:
