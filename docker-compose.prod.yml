version: '3.9'

services:
  api:
    image: wise2-api:${VERSION:-latest}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_KEY: ${STRIPE_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - wise2

  website:
    image: wise2-website:${VERSION:-latest}
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: https://api.wise2.com
    networks:
      - wise2

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: wise2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wise2

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wise2

  traefik:
    image: traefik:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - wise2

volumes:
  postgres_data:
  redis_data:

networks:
  wise2:
    driver: bridge
