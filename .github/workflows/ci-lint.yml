name: CI - Lint & Format
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false


on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - '.eslintrc.json'
      - '.prettierrc.json'
      - '.github/workflows/ci-lint.yml'
      - 'package*.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - '.eslintrc.json'
      - '.prettierrc.json'
      - '.github/workflows/ci-lint.yml'
      - 'package*.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Check formatting with Prettier
        run: npm run format:check
        continue-on-error: false

      - name: Check for vulnerable dependencies
        run: npm audit --production
        continue-on-error: true

  format-check:
    name: Code Format Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check '**/*.{ts,tsx,js,jsx,json,md,yml,yaml}' --ignore-path .prettierignore

      - name: Verify no console.log in production code
        run: |
          if grep -r "console\\.log" services/*/src --include="*.ts" --include="*.tsx"; then
            echo "❌ console.log found in production code"
            exit 1
          else
            echo "✓ No console.log in production code"
          fi

  commit-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          # Check commit message format: type(scope): subject
          git log --format=%B origin/main..HEAD | while IFS= read -r line; do
            if [[ ! "$line" =~ ^(feat|fix|docs|style|refactor|perf|test|chore)(\(.+\))?: ]]; then
              if [ -n "$line" ] && [ "$line" != "" ]; then
                echo "Invalid commit message format: $line"
              fi
            fi
          done
