name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'services/dashboard/services/dashboard/**'
      - '.github/workflows/deploy-production.yml'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'services/dashboard/services/dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd services/dashboard/services/dashboard
          npm ci

      - name: Run ESLint
        run: |
          cd services/dashboard/services/dashboard
          npm run lint
        continue-on-error: true

      - name: Type check
        run: |
          cd services/dashboard/services/dashboard
          npm run type-check
        continue-on-error: true

      - name: Build
        run: |
          cd services/dashboard/services/dashboard
          npm run build

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "📦 Deploying WISE² Dashboard..."

            # Navigate to deployment directory
            cd /opt/wise2-core

            # Pull latest changes
            echo "📥 Pulling latest code..."
            git fetch origin
            git checkout origin/main

            # Build dashboard
            echo "🔨 Building dashboard..."
            cd services/dashboard/services/dashboard
            npm ci
            npm run build

            # Restart dashboard service (if using Docker Compose)
            echo "🚀 Restarting services..."
            docker-compose down
            docker-compose up -d

            echo "✅ Deployment complete!"

      - name: Health check
        run: |
          echo "🏥 Checking deployment health..."
          for i in {1..30}; do
            if curl -f http://173.208.147.165:3000 > /dev/null 2>&1; then
              echo "✅ Dashboard is healthy"
              exit 0
            fi
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done
          echo "❌ Dashboard health check failed"
          exit 1

      - name: Notify deployment
        if: success()
        run: echo "✅ Successfully deployed to https://wise2.net"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed - check logs above"
