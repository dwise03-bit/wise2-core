name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/website/**'
      - 'apps/dashboard/**'
      - 'apps/admin/**'
      - 'packages/api/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-production.yml'

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: dwise
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "📦 Deploying WISE² Platform..."

            # Navigate to deployment directory
            cd /opt/wise2-core

            # Pull latest changes
            echo "📥 Pulling latest code..."
            git fetch origin
            git checkout main
            git pull origin main

            # Deploy with Docker Compose
            echo "🚀 Rebuilding and restarting services..."
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build

            echo "✅ Deployment complete!"

      - name: Health check
        run: |
          echo "🏥 Checking deployment health..."
          for i in {1..30}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1 && curl -f http://localhost:3010/api/health > /dev/null 2>&1; then
              echo "✅ Services are healthy"
              exit 0
            fi
            echo "⏳ Waiting for services to be ready... ($i/30)"
            sleep 2
          done
          echo "❌ Health check failed - services did not become healthy"
          docker-compose -f docker-compose.prod.yml logs --tail 50
          exit 1

      - name: Notify deployment
        if: success()
        run: echo "✅ Successfully deployed to https://wise2.net"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed - check logs above"
