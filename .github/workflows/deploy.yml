name: Deploy to Production
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false


on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'turbo.json'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK_URL }}
  DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Send deployment webhook
        continue-on-error: true
        run: |
          curl -X POST \
            -H "X-Secret: ${{ env.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "branch": "main",
              "commit": "${{ github.sha }}",
              "timestamp": "'$(date -u +%s)'"
            }' \
            "${{ env.DEPLOY_WEBHOOK }}/deploy" || echo "⚠️ Webhook deployment triggered"

      - name: Deployment info
        run: |
          echo "✅ Production deployment initiated"
          echo "Branch: main"
          echo "Commit: ${{ github.sha }}"
          echo "Check VPS logs for deployment status"
