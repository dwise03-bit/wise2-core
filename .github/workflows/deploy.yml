name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'package.json'
      - 'turbo.json'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK_URL }}
  DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Get commit info
        id: commit
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Send deployment webhook
        run: |
          curl -X POST \
            -H "X-Secret: ${{ env.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "branch": "main",
              "commit": "${{ github.sha }}",
              "shortCommit": "${{ steps.commit.outputs.sha_short }}",
              "message": "'"$(echo '${{ steps.commit.outputs.message }}' | sed 's/"/\\"/g')"'",
              "timestamp": "'$(date -u +%s)'"
            }' \
            "${{ env.DEPLOY_WEBHOOK }}/deploy" || echo "⚠️ Webhook sent (check server)"

      - name: Deployment info
        run: |
          echo "✅ Production deployment initiated"
          echo "Branch: main"
          echo "Commit: ${{ github.sha }}"
          echo "Check VPS logs for deployment status"
