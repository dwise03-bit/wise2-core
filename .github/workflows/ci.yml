name: CI - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Install, Type-check, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Prisma needs a URL present for `generate`/`validate`; no DB is contacted.
      DATABASE_URL: postgresql://user:pass@localhost:5432/wise2?schema=public
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @wise2/db exec prisma generate

      # Blocking: the whole workspace is type-clean (0 errors across 12 packages)
      # and must stay that way. Run per-package via pnpm to avoid turbo's spawn
      # dependency and to fail fast on any regression.
      - name: Type-check workspace (blocking)
        run: pnpm -r run type-check

      - name: Lint workspace (informational)
        run: pnpm run lint
        continue-on-error: true

      - name: Test workspace (informational)
        run: pnpm run test
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Install: ok" >> "$GITHUB_STEP_SUMMARY"
          echo "- Prisma client: generated" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace type-check: passed (blocking, 12 packages)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace lint/test ran as informational" >> "$GITHUB_STEP_SUMMARY"
