# Prometheus Configuration for WISE² Production
# Metrics collection and alerting rules

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'wise2-production'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load alert rules
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Service
  - job_name: 'api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Website Frontend
  - job_name: 'website'
    static_configs:
      - targets: ['website:3000']
    scrape_interval: 30s

  # Admin Dashboard
  - job_name: 'admin'
    static_configs:
      - targets: ['admin:3000']
    scrape_interval: 30s

  # Dashboard Service
  - job_name: 'dashboard'
    static_configs:
      - targets: ['dashboard:3000']
    scrape_interval: 30s

  # Database (PostgreSQL)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
