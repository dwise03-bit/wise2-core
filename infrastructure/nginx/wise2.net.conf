# WISE² Production Nginx Configuration
# Handles routing for all wise2.net subdomains

# Upstream backends
upstream website_backend {
    server 127.0.0.1:3011;
}

upstream dashboard_backend {
    server 127.0.0.1:3002;
}

upstream admin_backend {
    server 127.0.0.1:3003;
}

upstream studio_backend {
    server 127.0.0.1:3005;
}

upstream api_backend {
    server 127.0.0.1:3010;
}

upstream grafana_backend {
    server 127.0.0.1:3100;
}

# SSL Configuration
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name wise2.net *.wise2.net;
    return 301 https://$server_name$request_uri;
}

# Root domain - Website
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wise2.net www.wise2.net;

    ssl_certificate /etc/letsencrypt/live/wise2.net-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wise2.net-0001/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/wise2.net-0001/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://website_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 90;
    }
}

